spring.datasource.url=jdbc:mariadb://localhost:3306/review_jogos_api
spring.datasource.username=root
spring.datasource.password=GenesisIgor30

# Driver explícito (geralmente opcional nas versões novas, mas recomendado)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configurações JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Nome da instância do limitador (deve coincidir com @RateLimiter(name = "rawgApiLimiter"))
resilience4j.ratelimiter.instances.rawgApiLimiter.limitForPeriod=5
resilience4j.ratelimiter.instances.rawgApiLimiter.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.rawgApiLimiter.timeoutDuration=0s

# Opcional: Habilitar métricas e health indicator para monitoramento
resilience4j.ratelimiter.instances.rawgApiLimiter.registerHealthIndicator=true
resilience4j.ratelimiter.instances.rawgApiLimiter.eventConsumerBufferSize=10

rawg.api.key=06172f9909d54f3f9c9ee9d34c1ff15d
rawg.api.url=https://api.rawg.io/api

spring.jpa.properties.hibernate.type.uuid_binary_ordering=true
# Ou para forçar o uso do tipo binário padrão:
spring.jpa.properties.hibernate.id.uuid_strategy=org.hibernate.id.UUIDGenerationStrategy
